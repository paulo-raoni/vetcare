name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore VetCare.sln

      - name: Build
        run: dotnet build VetCare.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VetCare.sln --configuration Release --no-build

      - name: Lint
        run: dotnet format VetCare.sln --verify-no-changes

  legacy-build:
    name: Legacy Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build LegacyReports
        run: dotnet build legacy/VetCare.LegacyReports/VetCare.LegacyReports.csproj --configuration Release

  e2e:
    name: E2E (Newman)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman

      - name: Start docker compose stack
        run: docker compose up -d postgres mongo localstack

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef --version 8.0.10

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if docker exec vetcare-postgres pg_isready -U vetcare >/dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres ($i/30)..."
            sleep 2
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Apply EF Core migrations
        run: dotnet ef database update --project src/VetCare.Infrastructure --startup-project src/VetCare.Infrastructure

      - name: Build API
        run: dotnet build src/VetCare.Api/VetCare.Api.csproj --configuration Release

      - name: Start API
        run: |
          nohup dotnet run --project src/VetCare.Api --configuration Release --no-build --urls http://localhost:5000 \
            > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5000/health >/dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API ($i/30)..."
            sleep 1
          done
          echo "API did not become ready in time" >&2
          cat api.log >&2 || true
          exit 1

      - name: Run Newman collection
        run: newman run docs/e2e/vetcare.collection.json --env-var baseUrl=http://localhost:5000

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" 2>/dev/null || true
          fi

      - name: Tear down docker compose stack
        if: always()
        run: docker compose down -v
