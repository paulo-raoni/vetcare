name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore VetCare.sln

      - name: Build
        run: dotnet build VetCare.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VetCare.sln --configuration Release --no-build

      - name: Lint
        run: dotnet format VetCare.sln --verify-no-changes

  legacy-build:
    name: Legacy Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build LegacyReports
        run: dotnet build legacy/VetCare.LegacyReports/VetCare.LegacyReports.csproj --configuration Release
